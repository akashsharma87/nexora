[build]
builder = "NIXPACKS"
buildCommand = "npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public && cp -r node_modules/.prisma .next/standalone/node_modules/.prisma"

[deploy]
startCommand = "npx prisma db push; HOSTNAME=0.0.0.0 node .next/standalone/server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
