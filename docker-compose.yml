services:
  postgres:
    image: postgres:16-alpine
    container_name: nexora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora
      POSTGRES_DB: nexora
    ports:
      - "5433:5432"
    volumes:
      - nexora-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora -d nexora"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nexora-postgres-data:
